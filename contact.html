<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to ZenCV - Contact Us</title>
    <style>
        body { background-color: #ffffff; color: #000000; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .header { display: flex; align-items: center; padding: 20px; border-bottom: 4px solid #7FFFD4; background: #000; color: #fff; }
        .logo { height: 60px; margin-right: 20px; }
        .container { padding: 50px 10%; display: flex; gap: 50px; }
        .contact-form { flex: 1; background: #f9f9f9; padding: 30px; border: 2px solid #000; border-radius: 15px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #000; border-radius: 5px; box-sizing: border-box;}
        .btn { background: #7FFFD4; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; border-radius: 5px; }
        .info-box { flex: 1; }
        .contact-method { margin-bottom: 30px; }
        .contact-method b { display: block; font-size: 1.2rem; color: #000; }
    </style>
</head>
<body>
    <div class="header">
        <img src="ZenCV1.png" alt="ZenCV Logo" class="logo">
        <h2>Welcome to ZenCV</h2>
    </div>
    <div class="container">
        <div class="contact-form">
            <h2>Send a Message</h2>
            <input type="email" placeholder="Your Email Address" required>
            <input type="text" placeholder="Your WhatsApp Number (with Country Code)" required>
            <textarea rows="5" placeholder="How can we help you?"></textarea>
            <button class="btn">Submit Inquiry</button>
        </div>
        <div class="info-box">
            <h1>Get in Touch</h1>
            <div class="contact-method">
                <b>Email Support:</b>
                <span>sv@nexusai-group.in</span>
            </div>
            <div class="contact-method">
                <b>WhatsApp Business:</b>
                <span>+91 8879267011</span>
            </div>
            <p>Our team is available Monday to Friday to assist you with your global resume strategy.</p>
        </div>
    </div>
</body>
</html>
