<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to ZenCV - Contact Us</title>
    <style>
        body { background-color: #ffffff; color: #000000; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .header { display: flex; align-items: center; padding: 20px; border-bottom: 4px solid #7FFFD4; background: #000; color: #fff; }
        .logo { height: 60px; margin-right: 20px; }
        
        /* Centered Container for Info only */
        .container { 
            padding: 80px 10%; 
            display: flex; 
            justify-content: center; 
            text-align: center; 
        }

        .info-box { 
            max-width: 600px; 
            padding: 40px;
            border: 2px solid #000;
            border-radius: 20px;
            box-shadow: 10px 10px 0px #7FFFD4; /* Creative Aqua Shadow */
        }

        h1 { color: #000; text-transform: uppercase; font-size: 2.5rem; margin-bottom: 30px; }
        
        .contact-method { margin-bottom: 30px; }
        .contact-method b { 
            display: block; 
            font-size: 1.2rem; 
            color: #000; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .contact-method span {
            font-size: 1.4rem;
            font-weight: bold;
            color: #1e3a8a; /* Navy Blue for contrast */
        }

        .highlight-bar {
            height: 5px;
            width: 50px;
            background: #7FFFD4;
            margin: 10px auto 20px auto;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="ZenCV1.png" alt="ZenCV Logo" class="logo">
        <h2>Welcome to ZenCV</h2>
    </div>

    <div class="container">
        <div class="info-box">
            <h1>Get in Touch</h1>
            <div class="highlight-bar"></div>
            
            <div class="contact-method">
                <b>Email Support:</b>
                <span>sv@nexusai-group.in/span>
            </div>

            <div class="contact-method">
                <b>WhatsApp Business:</b>
                <span>+91 8879267011</span>
            </div>

            <p style="margin-top: 40px; color: #666; font-style: italic;">
                Our global support team typically responds within 24 business hours.
            </p>
        </div>
    </div>
</body>
</html>
