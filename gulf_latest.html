    <style>
        :root {
            --primary-bg: #f4f7f6;
            --panel-width: 450px;
            /* CV Dynamic Variables */
            --cv-primary-color: #1F3A5F;
            --cv-secondary-color: #333333;
            --cv-accent-color: #ffd700;
            --cv-font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --cv-font-header: 'Georgia', serif;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* LEFT PANEL: INPUTS */
        .input-panel {
            width: var(--panel-width);
            background: #ffffff;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        /* RIGHT PANEL: PREVIEW */
     .preview-panel {
    flex-grow: 1;
    background: #525659;
    overflow-y: auto; /* Allow scrolling the paper */
    padding: 20px;
    display: block; /* Change from flex to allow height growth */
}

        /* CONTROLS */
        .controls {
            position: sticky;
            top: 0;
            background: white;
            padding: 10px 0;
            border-bottom: 2px solid var(--cv-primary-color);
            margin-bottom: 20px;
            z-index: 100;
        }

        .btn-randomize {
            background: #e67e22;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            border-radius: 5px;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-randomize:hover { background: #d35400; }

        /* FORM STYLING */
        .section-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        h3 { color: #2c3e50; font-size: 1.1rem; border-left: 4px solid #3498db; padding-left: 10px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 4px; }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* CV PAPER STYLING */
     #cv-paper {
    width: 210mm; /* Fixed A4 Width */
    min-height: 297mm;
    background: white;
    box-sizing: border-box;
    margin: 0 auto;
    position: relative;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    /* Prevent cutting in preview */
    transform: scale(0.8); /* Scale down for laptop screens */
    transform-origin: top center;
}

        /* TOGGLE SWITCH */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px; width: 22px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #2196F3; }
        input:checked + .slider:before { transform: translateX(30px); }

        /* CV DYNAMIC LAYOUT CLASSES */
        .cv-grid { display: grid; height: 100%; }
        .cv-sidebar { padding: 30px; }
        .cv-main { padding: 40px; }

        /* RANDOMIZABLE COMPONENTS */
        .skill-bar { height: 8px; background: #eee; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .skill-progress { height: 100%; background: var(--cv-primary-color); }
        .profile-img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 5px solid white; }
        
        /* THEMES */
        .theme-border { border: 15px solid var(--cv-primary-color); }
        .theme-bevel { border-radius: 50px 0 50px 0; }
        .rtl { direction: rtl; }




/* Layout Shapes */
.rounded-style { border-radius: 30px; }
.bevel-style { border-radius: 80px 0 80px 0; }
.border-accent { border: 10px solid var(--cv-primary-color); }
.shadow-deep { box-shadow: 0 10px 50px rgba(0,0,0,0.5); }

/* Field Icons */
.cv-field-icon { color: var(--cv-accent-color); margin-right: 8px; width: 14px; text-align: center; }





/* Page Break Protection for PDF */
h4, .section-box, .exp-item, .edu-item {
    page-break-inside: avoid;
    break-inside: avoid;
}

/* Fix for the hidden text in PDF */
#cv-content-wrapper {
    width: 100%;
    min-height: 297mm;
    display: block;
    overflow: visible !important;
}





/* --- THE FINAL ABSOLUTE MOBILE FIX --- */
@media screen and (max-width: 768px) {
    /* 1. FORCE UNLOCK: This stops the screen from being frozen and sliding right */
    html, body { 
        height: auto !important; 
        overflow-x: hidden !important; 
        overflow-y: auto !important; 
        display: block !important; 
        width: 100% !important;
        position: relative !important;
    }

    /* 2. STACK PANELS: Form on top, CV on bottom */
    .container { 
        display: block !important; 
        height: auto !important; 
        width: 100% !important;
    }

    /* 3. FORM PANEL: Full width, normal scrolling */
    .input-panel { 
        width: 100% !important; 
        height: auto !important; 
        max-height: none !important;
        position: relative !important; 
        border-right: none !important;
        display: block !important;
        padding: 15px !important;
        box-sizing: border-box !important;
    }

    /* 4. PREVIEW PANEL: Centering container that hides overflow */
    .preview-panel { 
        width: 100% !important; 
        height: auto !important;
        display: block !important;
        padding: 40px 0 !important;
        margin: 0 !important;
        background: #525659 !important;
        overflow: hidden !important; /* THIS STOPS THE CUTTING */
    }

    /* 5. THE CV PAPER: Exact scale and centering used in ATS.html */
  #cv-paper { 
        transform: scale(0.42) !important; 
        transform-origin: top center !important; 
        position: relative !important;
        /* THE ONE-LINER ADJUSTMENTS */
        left: 50% !important; margin-left: -105mm !important; 
        margin-bottom: -580px !important; /* This enables the scroll down */
    }
    /* 6. MODAL FIXES: Keep everything on screen */
    #kw-modal > div, #clModal > div {
        width: 95% !important;
        max-width: 95% !important;
        padding: 15px !important;
        margin: 10px auto !important;
        box-sizing: border-box !important;
    }
    
    #cl-paper {
        width: 100% !important;
        transform: none !important;
        min-height: auto !important;
    }

    /* Prevent text inputs from auto-zooming on tap */
    input, select, textarea { font-size: 16px !important; }
}













/* --- THE FINAL ABSOLUTE MOBILE FIX --- */
@media screen and (max-width: 768px) {
    .container { display: block !important; }
    .input-panel { width: 100% !important; height: auto !important; }

    .preview-panel { 
        width: 100% !important; 
        display: flex !important;           /* Use flex for PNG alignment */
        justify-content: center !important; 
        padding: 40px 0 !important;
        overflow: hidden !important; 
    }

    #cv-paper { 
        transform: scale(0.42);             /* Removed !important so JS can reset it */
        transform-origin: top center; 
        left: 0 !important;                 /* Reset the shift */
        margin: 0 !important;                /* Reset the negative margin */
        flex-shrink: 0 !important;
        margin-bottom: -600px !important; 
    }
}

/* --- NATIVE PRINT ENGINE (Fixes Blank PDF on Mobile) --- */
@media print {
    .input-panel, .controls, button, .section-box, .no-print { display: none !important; }
    .preview-panel { background: white !important; display: block !important; padding: 0 !important; }
    #cv-paper { transform: none !important; margin: 0 auto !important; width: 210mm !important; box-shadow: none !important; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
}

/* 1. Global Panel Setup & Scrolling (Remove Fixed) */

/* 4. Center Toggle & Black Font for Fresher/Experienced */
.toggle-container {

}

.toggle-container span {
    color: #000000 !important; 
    font-weight: 900 !important;
    font-size: 15px !important;
    text-transform: uppercase !important;
}

/* 5. ALL BUTTONS (Main Buttons & Cover Letter) */
.btn-randomize, 
button[onclick*="generateGulfCoverLetter"],
.input-panel button:not([onclick*="addItem"]):not([onclick*="remove"]) {
    background: var(--aqua) !important;
    color: var(--black) !important;
    border: 2px solid var(--black) !important;
    border-radius: 12px !important;
    padding: 12px !important;
    text-transform: uppercase !important;
    font-weight: 900 !important;
    width: 100% !important;
    margin-bottom: 10px !important;
    box-shadow: 0 8px 15px rgba(127, 255, 212, 0.3) !important;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
}

/* 6. +ADD Buttons (Aqua) */
button[onclick*="addItem"] {
    background: var(--aqua) !important;
    color: var(--black) !important;
    border: 2px solid var(--black) !important;
    border-radius: 8px !important;
    padding: 5px 15px !important;
    text-transform: uppercase !important;
}

/* 7. Card Styling & Input Box Logic */
.section-box {
    background: var(--white) !important;
    border-radius: 20px !important;
    border: 1px solid var(--aqua) !important;
    padding: 20px !important;
    margin-bottom: 20px !important;
}

.input-panel input, .input-panel textarea, .input-panel select {
    background-color: #f8fcfb !important;
    color: var(--black) !important;
    border: 1px solid #ddd !important;
}

/* 8. Light Placeholders (Not Bold) */
.input-panel ::placeholder {
    font-family: sans-serif !important;
    font-weight: 400 !important;
    opacity: 0.5 !important;
    color: #555 !important;
}

/* 9. Browse Area Mini-Card */
.section-box:has(#cv-upload) {
    background: var(--aqua) !important;
    border: 2px dashed var(--black) !important;
}

/* 10. Power-O-Meter & Strong Labels */
#power-score-label, #strong-count, #weak-count, 
div:has(> #strong-count), #strong-count { 
    color: var(--black) !important;

}

/* 11. Intense Bevel Hover Effect */
.input-panel button:hover {
    transform: translateY(-5px) !important;

        0 15px 30px rgba(127, 255, 212, 0.4),
        inset 4px 4px 0px rgba(255, 255, 255, 0.7), 
        inset -4px -4px 0px rgba(0, 0, 0, 0.3) !important;
}
.input-panel .section-box:last-of-type h3 { color: #000 !important; text-transform: uppercase !important; font-weight: 900 !important; }

  function downloadWord() {
    const cvWrapper = document.getElementById('cv-content-wrapper');
    if (!cvWrapper) return;

    // 1. Get current Colors and Layout Type from the System
    const rootStyle = getComputedStyle(document.documentElement);
    const pColor = rootStyle.getPropertyValue('--cv-primary-color').trim() || '#1F3A5F';
    const aColor = rootStyle.getPropertyValue('--cv-accent-color').trim() || '#ffd700';
    const mColor = rootStyle.getPropertyValue('--main-text').trim() || '#333333';
    const sColor = rootStyle.getPropertyValue('--side-text').trim() || '#ffffff';
    
    // Detect which random layout is currently active
    const currentLayout = cvWrapper.getAttribute('data-layout') || 'classic-single';

    // 2. Clone content and handle the image
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = cvWrapper.innerHTML;
    
    // Force dimensions on the image so Word renders it
    const img = tempDiv.querySelector('img');
    if (img) {
        img.setAttribute('width', '100');
        img.setAttribute('height', '100');
        img.style.borderRadius = '50%';
    }

    let finalTableStructure = "";

    // 3. TRANSFORM LIVE PREVIEW INTO WORD-COMPATIBLE TABLES
    if (currentLayout === 'ali-style') {
        const sideContent = tempDiv.querySelector('div[style*="width:32%"]')?.innerHTML || "";
        const mainContent = tempDiv.querySelector('div[style*="width:68%"]')?.innerHTML || "";
        finalTableStructure = `
            <tr>
                <td width="32%" style="background-color:${pColor}; mso-shading:${pColor}; color:${sColor}; padding:20pt; vertical-align:top;">${sideContent}</td>
                <td width="68%" style="padding:30pt; color:${mColor}; vertical-align:top;">${mainContent}</td>
            </tr>`;
    } 
    else if (currentLayout === 'bandar-style') {
        const headerContent = tempDiv.querySelector('div[style*="padding:35px"]')?.innerHTML || "";
        const bodyCols = tempDiv.querySelector('div[style*="display:grid"]');
        const col1 = bodyCols?.children[0]?.innerHTML || "";
        const col2 = bodyCols?.children[1]?.innerHTML || "";
        finalTableStructure = `
            <tr><td colspan="2" style="background-color:${pColor}; mso-shading:${pColor}; color:${sColor}; padding:25pt;">${headerContent}</td></tr>
            <tr>
                <td width="60%" style="padding:20pt; vertical-align:top; color:${mColor};">${col1}</td>
                <td width="40%" style="padding:20pt; vertical-align:top; color:${mColor}; border-left:1pt solid #eee;">${col2}</td>
            </tr>`;
    } 
    else {
        // Classic / Single Column
        finalTableStructure = `<tr><td style="padding:30pt; color:${mColor};">${tempDiv.innerHTML}</td></tr>`;
    }

    // 4. Bake in the remaining CSS variables into standard styles
    let finalHtml = finalTableStructure
        .replace(/var\(--cv-primary-color\)/g, pColor)
        .replace(/var\(--cv-accent-color\)/g, aColor)
        .replace(/<h4>/g, `<h4 style="color:${pColor}; border-bottom:1pt solid ${pColor}; text-transform:uppercase; margin-top:15pt;">`)
        .replace(/at-title/g, `style="font-weight:bold; color:${pColor}; font-size:11pt;"`)
        .replace(/at-comp/g, `style="font-weight:bold; font-size:10pt;"`);

    // 5. Build the Final Document
    const wordContent = `
    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
    <head>
        <meta charset='utf-8'>
        <style>
            @page { size: 21cm 29.7cm; margin: 0.5in; }
            body { font-family: 'Segoe UI', Arial, sans-serif; }
            h1 { font-size: 22pt; margin:0; }
            p, div { font-size: 10pt; line-height: 1.3; }
        </style>
    </head>
    <body>
        <table border="0" cellspacing="0" cellpadding="0" width="100%" style="width:100%; border-collapse:collapse;">
            ${finalHtml}
        </table>
    </body>
    </html>`;

    // 6. Trigger Download
    const blob = new Blob(['\ufeff', wordContent], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'Professional_Gulf_CV.doc';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

let uploadedCVText = ""; // The Global Source of Truth
const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

async function handleGulfUpload(input) {
    const status = document.getElementById('upload-status');
    const file = input.files[0];
    if (!file || file.type !== "application/pdf") {
        alert("❌ Error: Please upload a valid PDF file.");
        return;
    }

    status.innerText = "⏳ Reading PDF Content...";
    status.style.color = "#e67e22";

    const reader = new FileReader();
    reader.onload = async function() {
        const typedarray = new Uint8Array(this.result);
        try {
            const pdf = await pdfjsLib.getDocument(typedarray).promise;
            let extractedText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                extractedText += content.items.map(item => item.str).join(" ") + " ";
            }
            uploadedCVText = extractedText.toLowerCase();
            status.innerText = "✅ Uploaded & Read Successfully: " + file.name;
            status.style.color = "#27ae60";
        } catch (err) {
            alert("❌ Failed to read PDF content.");
        }
    };
    reader.readAsArrayBuffer(file);
}

function calculateATS() {
    const jd = document.getElementById('jd-box').value.trim().toLowerCase();
    const resultBox = document.getElementById('ats-display');

    if (!uploadedCVText) return alert("⚠️ Please upload a PDF CV first!");
    if (jd.length < 30) return alert("⚠️ Please paste a Job Description!");

    resultBox.style.display = 'block';

    // 1. JD MATCH (35 Marks) - Fixed for exact word matches using Word Boundaries
    const stopWords = ['responsible', 'working', 'company', 'management', 'process', 'tasks', 'duties'];
    const jdWords = [...new Set(
        (jd.match(/\b(\w{5,})\b/g) || []).filter(w => !stopWords.includes(w))
    )];
    const kMatches = jdWords.filter(w => new RegExp(`\\b${w}\\b`).test(uploadedCVText)).length;
    const kScore = Math.round(jdWords.length > 0 ? (kMatches / jdWords.length) * 35 : 0);

    // 2. SKILLS (15 Marks) - Fixed with Word Boundaries
    const skillKeywords = ['excel','sap','tally','python','sql','autocad','revit','hvac','mep','vat','audit','crm','erp','leadership','accounting'];
    const skillMatches = skillKeywords.filter(s => new RegExp(`\\b${s}\\b`).test(uploadedCVText)).length;
    const sScore = Math.min(15, Math.round(skillMatches * 2));

    // 3. EXPERIENCE (20 Marks) - Scaled based on found indicators, capped at 20
    const expYearsFound = (uploadedCVText.match(/\d+\+?\s*(years?|yrs?)/gi) || []).length;
    const eScore = Math.min(20, expYearsFound >= 3 ? 20 : expYearsFound * 6);

    // 4. GULF READINESS (15 Marks) - Scaled accurately for regional visibility
    const region = ['uae', 'dubai', 'saudi', 'qatar', 'oman', 'bahrain', 'visa', 'passport', 'transferable', 'immediate', 'residence'];
    const gMatches = region.filter(r => new RegExp(`\\b${r}\\b`).test(uploadedCVText)).length;
    const gScore = Math.min(15, gMatches >= 7 ? 15 : gMatches * 2);

    // 5. FORMATTING (5 Marks)
    let fScore = 0;
    if (uploadedCVText.includes('education')) fScore += 2;
    if (uploadedCVText.includes('experience')) fScore += 2;
    if (uploadedCVText.includes('skills')) fScore += 1;

    // 6. OTHERS (10 Marks)
    let oScore = 0;
    if (/dob|nationality|marital/i.test(uploadedCVText)) oScore += 2;
    if (/english|arabic|hindi/i.test(uploadedCVText)) oScore += 2;
    if (/linkedin/.test(uploadedCVText)) oScore += 2;
    if ((uploadedCVText.match(/20\d{2}/g) || []).length >= 3) oScore += 2;
    const wordCount = uploadedCVText.split(' ').length;
    if (wordCount > 300 && wordCount < 2000) oScore += 2;

    // FINAL CALCULATION
    const total = Math.min(100, kScore + sScore + eScore + gScore + fScore + oScore);
    
    // Missing Keywords Suggestion using Regex Boundaries
    const missing = jdWords.filter(w => !new RegExp(`\\b${w}\\b`).test(uploadedCVText)).slice(0,5);

    resultBox.innerHTML = `
        <div style="text-align:center; border-bottom:1px solid #eee; margin-bottom:12px; padding-bottom:10px;">
            <h2 style="margin:0; font-size:38px; color:#27ae60;">${total}%</h2>
            <p style="font-size:10px; font-weight:bold; color:#666; letter-spacing:1px; text-transform:uppercase;">Gulf ATS Compatibility Score</p>
        </div>
        <div style="font-size:12px; line-height:2;">
            <div style="display:flex; justify-content:space-between;"><span>🎯 JD Match:</span><b>${kScore}/35</b></div>
            <div style="display:flex; justify-content:space-between;"><span>🛠️ Skill Score:</span><b>${sScore}/15</b></div>
            <div style="display:flex; justify-content:space-between;"><span>💼 Experience Score:</span><b>${eScore}/20</b></div>
            <div style="display:flex; justify-content:space-between;"><span>🌍 Gulf Readiness:</span><b>${gScore}/15</b></div>
            <div style="display:flex; justify-content:space-between;"><span>📑 Formatting:</span><b>${fScore}/5</b></div>
            <div style="display:flex; justify-content:space-between;"><span>✨ Others:</span><b>${oScore}/10</b></div>
        </div>
        ${missing.length > 0 ? `
        <div style="margin-top:15px; padding:10px; background:#fff9c4; border-radius:5px; font-size:11px; color:#856404; border:1px solid #ffeeba;">
            <strong>🚀 ACCURATE SUGGESTION:</strong><br>
            Add these missing keywords: <i>${missing.join(', ')}</i> to significantly improve your match score.
        </div>` : ''}`;
}

function openKeywordChallenge() {
    const role = document.getElementById('target-role').value;
    
    // 1. Selection Validation
    if (!role) {
        alert("❌ ERROR: Please select a Target Role first to generate relevant keywords.");
        return;
    }

    // 2. Data Retrieval (Fall back to Accountant if role not specifically mapped yet)
    const keywords = challengeRepo[role] || challengeRepo["Accountant"];
    
    // 3. Create Modal HTML
    let tableRows = keywords.map(item => `
        <tr style="border-bottom: 1px solid #ddd;">
            <td style="padding: 10px; font-weight: bold; color: #2c3e50;">${item.k}</td>
            <td style="padding: 10px; color: #7f8c8d;">${item.s}</td>
        </tr>
    `).join('');

    const modalHtml = `
        <div id="kw-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000; display:flex; align-items:center; justify-content:center;">
            <div style="background:white; width:90%; max-width:500px; padding:25px; border-radius:12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="margin:0; color:#1F3A5F; font-size:1.4rem;">🎯 Keyword Challenge: ${role}</h2>
                    <button onclick="document.getElementById('kw-modal').remove()" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
                </div>
                <p style="font-size:13px; color:#666; margin-bottom:15px;">Include these 15 keywords in the specified sections to boost your Gulf ATS score.</p>
                <div style="max-height:400px; overflow-y:auto;">
                    <table style="width:100%; border-collapse:collapse; text-align:left; font-size:13px;">
                        <thead style="background:#f4f7f6; position:sticky; top:0;">
                            <tr>
                                <th style="padding:10px;">KEYWORD</th>
                                <th style="padding:10px;">TARGET SECTION</th>
                            </tr>
                        </thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                </div>
                <button onclick="document.getElementById('kw-modal').remove()" style="width:100%; background:#2c3e50; color:white; border:none; padding:12px; border-radius:6px; margin-top:20px; cursor:pointer; font-weight:bold;">I UNDERSTAND</button>
            </div>
        </div>
    `;

    document.body.insertAdjacentHTML('beforeend', modalHtml);
}

function calculatePowerScore() {
    // 1. Gather text from Gulf-specific fields
    let allText = "";
    
    // Summary or Career Objective (Gulf uses both depending on toggle)
    const obj = document.getElementById('in-objective');
    const sum = document.getElementById('in-e-summary');
    if (obj) allText += " " + obj.value;
    if (sum) allText += " " + sum.value;
    
    // dynamic fields in Gulf file use classes like .at-desc, .at-title, .at-val, .at-name
    const dynamicInputs = document.querySelectorAll('.at-desc, .at-title, .at-val, .at-name, .at-comp');
    dynamicInputs.forEach(input => {
        allText += " " + input.value;
    });

    // 2. Tokenize and clean text
    const words = allText.toLowerCase().match(/\b(\w+)\b/g) || [];
    
    let strongUsage = {};
    let weakUsage = {};
    let totalStrong = 0;
    let totalWeak = 0;

    words.forEach(word => {
        // Count Strong Verbs (Cap at 3 per word)
        if (verbLists.strong.includes(word)) {
            strongUsage[word] = (strongUsage[word] || 0) + 1;
            if (strongUsage[word] <= 3) totalStrong++;
        }
        
        // Count Weak Verbs (Cap at 3 per word)
        if (verbLists.weak.includes(word)) {
            weakUsage[word] = (weakUsage[word] || 0) + 1;
            if (weakUsage[word] <= 3) totalWeak++;
        }
    });

    // 3. Formula: ((S - W) / (S + W)) * 100
    const totalWordsCounted = totalStrong + totalWeak;
    let score = 0;
    
    if (totalWordsCounted > 0) {
        score = Math.round(((totalStrong - totalWeak) / totalWordsCounted) * 100);
    }

    // 4. Update UI
    const bar = document.getElementById('power-bar');
    const label = document.getElementById('power-score-label');
    
    if(!bar || !label) return; // Safety check

    label.innerText = (score > 0 ? "+" : "") + score;
    document.getElementById('strong-count').innerText = totalStrong;
    document.getElementById('weak-count').innerText = totalWeak;

    // Mapping -100/+100 to 0-100% width
    const barWidth = ((score + 100) / 200) * 100;
    bar.style.width = barWidth + "%";

    // Dynamic Colors based on Score
    if (score < 0) {
        bar.style.background = "linear-gradient(90deg, #ff0055, #ff4d4d)";
        label.style.color = "#ff0055";
    } else if (score < 40) {
        bar.style.background = "linear-gradient(90deg, #ffcc00, #ffee00)";
        label.style.color = "#ffcc00";
    } else {
        bar.style.background = "linear-gradient(90deg, #00ffcc, #33ffaa)";
        label.style.color = "#00ffcc";
    }
}

function analyzeSkills() {
    const role = document.getElementById('target-role').value;
    if (!role) return alert("❌ Please select a Target Role first!");

    // 1. Gather all text from Gulf-specific inputs
    let cvText = "";
    const obj = document.getElementById('in-objective');
    const sum = document.getElementById('in-e-summary');
    if (obj) cvText += " " + obj.value;
    if (sum) cvText += " " + sum.value;
    
    // Scan dynamic fields (.at-desc, .at-name, .at-title, .at-val)
    document.querySelectorAll('.at-desc, .at-title, .at-val, .at-name, .at-comp').forEach(input => {
        cvText += " " + input.value;
    });
    cvText = cvText.toLowerCase();

    // 2. Identify Unique Skills
    let foundSkills = { HARD: 0, SOFT: 0, TECHNICAL: 0, MANAGEMENT: 0, DOMAIN: 0 };
    let totalUniqueFound = 0;
    let countedWords = new Set();

    Object.keys(skillClassifier).forEach(cat => {
        skillClassifier[cat].forEach(skill => {
            if (cvText.includes(skill.toLowerCase()) && !countedWords.has(skill)) {
                foundSkills[cat]++;
                countedWords.add(skill);
                totalUniqueFound++;
            }
        });
    });

    if (totalUniqueFound === 0) return alert("⚠️ No skills detected in CV. Add keywords to your experience or skills section.");

    // 3. Calculate Actual % Breakdown
    let actualPerc = {};
    Object.keys(foundSkills).forEach(cat => {
        actualPerc[cat] = Math.round((foundSkills[cat] / totalUniqueFound) * 100);
    });

    // 4. Calculate Scores & Weights
    const req = requiredSkillsRepo[role] || requiredSkillsRepo["Default"];
    let weightedSum = 0;
    let breakdownHtml = "";

    Object.keys(req).forEach(cat => {
        const actual = actualPerc[cat] || 0;
        const required = req[cat];
        let score = 0;

        if (actual === required) score = 0;
        else if (actual > required) {
            score = (actual - required <= 10) ? 1 : 2;
        } else {
            score = (required - actual <= 10) ? -1 : -2;
        }

        const weightedScore = score * required;
        weightedSum += weightedScore;

        const color = score > 0 ? "#7FFFD4" : (score < 0 ? "#ff0055" : "#ffffff");
        breakdownHtml += `
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #222; padding-bottom:5px;">
                <span style="color:#888; text-transform:uppercase; font-size:10px;">${cat} SKILLS</span>
                <span style="color:${color}; font-weight:bold;">${score > 0 ? '+' : ''}${weightedScore}</span>
            </div>
        `;
    });

    // 5. Normalization & Verdicts
    const finalScore = Math.round(((weightedSum + 200) / 400) * 100);
    let verdict = ""; let themeColor = ""; let scoreSummary = "";

    if (finalScore >= 85) { 
        verdict = "EXCELLENT 🚀"; themeColor = "#7FFFD4"; 
        scoreSummary = "Near-perfect match. Highly optimized CV. Strong shortlist chances.";
    } else if (finalScore >= 70) { 
        verdict = "STRONG 💪"; themeColor = "#33ffaa"; 
        scoreSummary = "Well aligned with job. Minor gaps only. Likely to pass ATS.";
    } else if (finalScore >= 50) { 
        verdict = "GOOD 👍"; themeColor = "#ffee00"; 
        scoreSummary = "Balanced profile. Most requirements covered. Still lacks depth in key areas.";
    } else if (finalScore >= 25) { 
        verdict = "AVERAGE ⚠️"; themeColor = "#ff9900"; 
        scoreSummary = "Some alignment exists. But big gaps (usually domain/technical). Not competitive yet.";
    } else { 
        verdict = "POOR ❌"; themeColor = "#ff0055"; 
        scoreSummary = "Major mismatch with job requirements. Missing key skill categories. Needs heavy optimization.";
    }

    // 6. UI MODAL GENERATION
    const oldModal = document.getElementById("skillz-modal");
    if (oldModal) oldModal.remove();

    const modal = document.createElement('div');
    modal.id = "skillz-modal";
    modal.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100010; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(10px);";
    modal.innerHTML = `
        <div style="background:#000; border:3px solid #7FFFD4; width:350px; padding:30px; border-radius:24px; text-align:center; font-family: 'Britannic Bold', sans-serif;">
            <h2 style="color:#7FFFD4; text-transform:uppercase; letter-spacing:2px; margin:0;">Skills Analysis</h2>
            <div style="font-size:72px; color:${themeColor}; font-weight:900;">${finalScore}%</div>
            <div style="font-size:18px; color:${themeColor}; margin-bottom:20px;">${verdict}</div>
            
            <div style="background:rgba(255,255,255,0.05); padding:12px; border-radius:10px; font-size:11px; color:#ccc; margin-bottom:15px; border-left:4px solid ${themeColor}; text-align:left; line-height:1.4; font-family: sans-serif;">
                ${scoreSummary}
            </div>

            <div style="background:#111; padding:20px; border-radius:15px; margin-bottom:20px; text-align:left;">
                ${breakdownHtml}
            </div>

            <button onclick="document.getElementById('skillz-modal').remove()" 
                style="width:100%; background:#7FFFD4; color:#000; border:none; padding:15px; border-radius:12px; font-weight:900; cursor:pointer; text-transform:uppercase;">
                Close Report
            </button>
        </div>
    `;
    document.body.appendChild(modal);
}
