    <style>
        :root {
            --aqua: #7FFFD4;
            --white: #ffffff;
            --black: #000000;
            --shadow: rgba(0, 0, 0, 0.15);
            --red: #ff4d4d;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            min-height: 100vh;
            background-color: var(--white);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 30px;
            border: 1px solid var(--aqua);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px var(--shadow), inset 0 0 20px rgba(127, 255, 212, 0.2);
            max-width: 400px;
            width: 85%;
            z-index: 10;
            margin: 20px auto;
            position: relative;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--black);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: underline;
            text-decoration-color: var(--black);
            text-underline-offset: 10px;
            text-decoration-thickness: 4px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .cv-btn {
            width: 100%;
            padding: 15px 20px;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--black);
            background-color: var(--aqua);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 15px rgba(127, 255, 212, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            text-decoration: none;
            text-transform: uppercase;
        }

        .cv-btn:hover {
            transform: translateY(-4px);
            background-color: var(--white);
            outline: 2px solid var(--aqua);
        }

        .btn-red {
            background-color: var(--red) !important;
            color: white !important;
            margin-bottom: 20px;
            box-shadow: 0 8px 15px rgba(255, 77, 77, 0.4) !important;
        }

        .btn-red:hover {
            background-color: #ff3333 !important;
            outline: 2px solid var(--black) !important;
        }

        .btn-fancy { border-left: 8px solid var(--black); }

        .btn-guide {
            background: var(--white) !important;
            border: 2px solid var(--black) !important;
            margin-bottom: 5px;
            font-weight: 900;
        }

        /* Results Overlay */
        .guide-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 99999;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            overflow-y: auto;
            padding: 60px 20px;
            box-sizing: border-box;
        }

        .guide-overlay.active { transform: translateY(0); }

        .close-btn {
            position: fixed; top: 15px; right: 25px; font-size: 45px; 
            border: none; background: none; cursor: pointer; font-weight: bold;
            z-index: 100001;
        }

        .guide-content { max-width: 800px; margin: 0 auto; color: var(--black); }

        .guide-title { 
            font-size: 1.8rem; font-weight: 900; border-bottom: 5px solid var(--aqua); 
            display: inline-block; margin-bottom: 30px; text-transform: uppercase;
        }

        .country-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 10px solid var(--black);
            box-shadow: 0 10px 25px var(--shadow);
            text-align: left;
        }

        .country-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 12px;
            padding-bottom: 8px;
        }

        .country-name { font-size: 1.3rem; font-weight: 900; }
        .main-score { background: var(--aqua); padding: 4px 12px; border-radius: 15px; font-weight: 900; font-size: 0.9rem; }

        .details-list { list-style: none; padding: 0; margin: 0; }
        .details-list li {
            padding: 4px 0;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }
        .details-list li::before {
            content: "•"; color: var(--aqua); font-weight: bold; margin-right: 10px;
        }

        .help-section h3 { margin-top: 25px; color: var(--red); font-size: 1.1rem; border-bottom: 2px solid #eee; padding-bottom: 5px; text-transform: uppercase; }

        @media (max-width: 768px) {
            .container { width: 90%; padding: 25px 15px; }
            h1 { font-size: 1.4rem; }

        function renderRankings(criteria) {
            const listDiv = document.getElementById('rankingsList');
            const modalTitle = document.getElementById('modalTitle');
            listDiv.innerHTML = '';
            const titles = {
                ease: "Ease of Process",
                salary: "Salary Potential",
                opps: "Profession Wise Opportunities",
                col: "Cost of Living",
                time: "Processing Time",
                overall: "Overall Score"
            };
            modalTitle.innerText = titles[criteria] + " Rankings";
            let sortedData = [...data].sort((a, b) => (criteria === 'overall' ? b.overall : b[criteria].score) - (criteria === 'overall' ? a.overall : a[criteria].score));
            
            sortedData.slice(0, 3).forEach((country, index) => { 
                const card = document.createElement('div');
                card.className = 'country-card';
                let scoreVal = (criteria === 'overall') ? country.overall : country[criteria].score;
                let subDetails = (criteria === 'overall') ? ["Combined assessment of all migration factors"] : country[criteria].details;
                card.innerHTML = `
                    <div class="country-header">
                        <span class="country-name">#${index+1} ${country.name}</span>
                        <span class="main-score">${Math.round(scoreVal)}/10</span>
                    </div>
                    <ul class="details-list">${subDetails.map(item => `<li>${item}</li>`).join('')}</ul>
                `;
                listDiv.appendChild(card);
            });
            document.getElementById('overlay').classList.add('active');
        }

function calculateDestination() {
    const checkedInputs = Array.from(document.querySelectorAll('.quiz-option input:checked'));
    const selectedKeys = checkedInputs.map(el => el.value);
    
    if (selectedKeys.length === 0) { 
        alert("Please select at least one preference!"); 
        return; 
    }

    // Mapping choices to the dynamic scores in your 'data' array
    const results = data.map(country => {
        let matchCount = 0;
        
        selectedKeys.forEach(key => {
            if (key === 'salary' && country.salary.score >= 8) matchCount++;
            if (key === 'fast' && country.time.score >= 8) matchCount++;
            if (key === 'lowCol' && country.col.score >= 7) matchCount++;
            if (key === 'hassleFree' && country.ease.score >= 7.5) matchCount++;
            // Dynamic check: Low cost usually correlates with high Ease (Employer driven)
            if (key === 'lowCost' && country.ease.score >= 7) matchCount++;
            // Dynamic check: More options usually correlates with high Opportunity scores
            if (key === 'options' && country.opps.score >= 8) matchCount++;
        });

        return { name: country.name, matches: matchCount };
    });

    // Sort descending by matches, then alphabetical
    const filteredResults = results
        .filter(r => r.matches > 0)
        .sort((a, b) => b.matches - a.matches);

const countryNames = filteredResults.slice(0, 3).map(r => r.name).join(', ');
    const userChoicesText = checkedInputs.map(el => el.parentElement.innerText.split('. ')[1]).join(', ');

    document.getElementById('quizResult').innerHTML = `
        <div class="quiz-result-box" style="text-align:left; font-family: Montserrat; border-radius:15px; margin-top:20px;">
            <p style="font-size: 0.7rem; text-transform: uppercase; color: #333; margin-bottom: 5px;">Your Choices:</p>
            <p style="font-size: 0.9rem; margin-bottom: 15px; color: #000;">${userChoicesText}</p>
            
            <p style="font-size: 0.7rem; text-transform: uppercase; color: #333; margin-bottom: 5px;">Top 3 Recommended Destinations:</p>
            <p style="font-size: 1.1rem; color: #000; line-height: 1.4;">${countryNames || "No matches found for this specific combination."}</p>
        </div>
    `;
}
